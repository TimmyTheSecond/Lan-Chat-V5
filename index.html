<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan-Chat Web</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- ✅ Load Ably FIRST -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js" defer></script>

    <!-- ✅ Then Chat SDK -->
    <script src="https://cdn.ably.com/lib/ably-chat/latest/ably-chat.min.js" defer></script>

    <!-- ✅ Then your script -->
    <script src="script.js" defer></script>
</head>
<body>

    <div id="loadingScreen">Connecting to Lan-Chat...</div>

    <div id="lockScreen">
        <h2>Entire chat locked</h2>
        <p id="lockMessage">Under maintenance</p>
    </div>

    <div class="chat-container" id="chatContainer">
        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." />
            <button id="sendBtn">Send</button>
            <input type="file" id="imageUpload" accept="image/*" style="display:none">
            <button id="imageBtn">📸</button>
        </div>

        <div class="name-area">
            <input type="text" id="nameInput" placeholder="Change name..." />
            <button id="nameBtn">Change</button>
        </div>
    </div>

    <div id="channels">
        <button data-channel="public-chat" onclick="switchChannel('public-chat')">Public</button>
        <button data-channel="private-1" onclick="switchChannel('private-1')">Private 1</button>
        <button data-channel="private-2" onclick="switchChannel('private-2')">Private 2</button>
    </div>

</body>
</html>
