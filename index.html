<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan-Chat Web</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- ✅ Load Ably FIRST -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdn.ably.com/lib/ably-chat.umd.cjs-0.js"></script>
    <!-- ✅ LiveObjects for unique usernames (state sync) -->
    <script src="https://cdn.ably.com/lib/objects.umd.min-2.js"></script>

    <!-- ✅ Then your script -->
    <script src="script.js" defer></script>
</head>
<body>

    <div id="loadingScreen">Connecting to Lan-Chat...</div>

    <div id="lockScreen">
        <h2>Entire chat locked</h2>
        <p id="lockMessage">Under maintenance</p>
    </div>

    <div id="channels">
        <button data-channel="public-chat" onclick="switchChannel('public-chat')">Public</button>
        <button data-channel="private-1" onclick="switchChannel('private-1')">Private 1</button>
        <button data-channel="private-2" onclick="switchChannel('private-2')">Private 2</button>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div id="chat"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." />
                <button id="sendBtn">Send</button>
                <input type="file" id="imageUpload" accept="image/*" style="display:none">
                <button id="imageBtn">📸</button>
            </div>

            <div class="name-area">
                <input type="text" id="nameInput" placeholder="Change name..." />
                <button id="nameBtn">Change</button>
            </div>
        </div>

        <!-- ✅ New sidebar - Who's Online -->
        <div id="sidebar">
            <h3>Online in <span id="currentChannelDisplay">Public</span></h3>
            <ul id="onlineList"></ul>
        </div>
    </div>

</body>
</html>
